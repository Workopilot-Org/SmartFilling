<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>登录测试页</title>
<style>
  body { font-family: sans-serif; margin: 24px; }
  .err { color: #c00; }
  .ok { color: #070; font-size: 20px; }
  input { display:block; margin:6px 0; padding:6px; width:240px; }
  button { padding:8px 16px; margin:6px 6px 6px 0; }
  #dbl-secret, #hover-tip, #welcome, #login-error { display:none; }
  #hover-zone { background:#eee; padding:20px; width:200px; }
  .spacer { height: 1200px; }
</style>
</head>
<body>
  <h1>登录测试页</h1>
  <form id="login-form" onsubmit="return doLogin(event)">
    <label>用户名 <input id="username" name="username" autocomplete="off"></label>
    <label>密码 <input id="password" name="password" type="password" autocomplete="off"></label>
    <label>验证码 <input id="captchaInput" name="captchaInput" autocomplete="off"></label>
    <button type="submit" id="login-btn">登录</button>
  </form>
  <p id="login-error" class="err">登录失败：用户名或密码错误</p>
  <div id="welcome" class="ok">登录成功，用户：<span id="welcome-user"></span></div>

  <hr>
  <h2>交互测试区</h2>
  <button id="dbl-btn">双击我显示秘密</button>
  <div id="dbl-secret">秘密已显示（双击触发）</div>

  <div id="hover-zone">鼠标悬停此处</div>
  <div id="hover-tip">悬停提示已显示</div>

  <div class="spacer"></div>
  <div id="scroll-target">滚动目标已到达</div>

<script>
  function doLogin(e){
    e.preventDefault();
    var u = document.getElementById('username').value;
    var p = document.getElementById('password').value;
    if (u === 'admin' && p === '123456') {
      document.getElementById('login-error').style.display = 'none';
      document.getElementById('welcome-user').textContent = u;
      document.getElementById('welcome').style.display = 'block';
      location.hash = '#welcome';  // URL 变化，供 url_changed/url_contains 检测
      return false;
    }
    document.getElementById('login-error').style.display = 'block';
    location.hash = '';
    return false;
  }
  document.getElementById('dbl-btn').addEventListener('dblclick', function(){
    document.getElementById('dbl-secret').style.display = 'block';
  });
  document.getElementById('hover-zone').addEventListener('mouseenter', function(){
    document.getElementById('hover-tip').style.display = 'block';
  });
</script>
</body>
</html>
